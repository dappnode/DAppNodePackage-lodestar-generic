name: Onchain Release Sync

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - "master"
      - "main"

jobs:
  onchain-release-sync:
    uses: dappnode/workflows/.github/workflows/onchain-release-sync.yml@master
    with:
      dry_run: false
      prerelease_only: false
      rust_log: "debug"
    secrets: inherit
