version: "3.5"
services:
  beacon-chain:
    build:
      args:
        NETWORK: hoodi
        P2P_PORT: 9712
        QUIC_PORT: 9713
    ports:
      - 9712:9712
      - 9712:9712/udp
      - 9713:9713/udp
    environment:
      CHECKPOINT_SYNC_URL: "https://checkpoint-sync-hoodi.dappnode.net"
  validator:
    build:
      args:
        NETWORK: hoodi
