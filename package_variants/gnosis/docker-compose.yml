version: "3.5"
services:
  beacon-chain:
    build:
      args:
        NETWORK: gnosis
        P2P_PORT: 19012
        QUIC_PORT: 19013
    ports:
      - 19012:19012
      - 19012:19012/udp
      - 19013:19013/udp
    environment:
      CHECKPOINT_SYNC_URL: "https://checkpoint-sync-gnosis.dappnode.net"
  validator:
    build:
      args:
        NETWORK: gnosis
